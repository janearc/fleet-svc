version: "1.0"
host:
  os: "darwin"
  arch: "arm64"
  # Which container engine fleet drives on this host. This workstation has
  # retired Docker Desktop in favour of colima; pinning it means a cold-boot
  # bootstrap will never silently launch Docker Desktop (which would shadow the
  # colima fleet with duplicate containers). Set to "docker-desktop" on a host
  # that prefers it, or "auto" to sniff (colima first, Docker Desktop fallback).
  docker_runtime: "colima"
  daemons:
    - "docker"
    - "uv"
    - "go"
  packages:
    - "jq"
    - "htop"
    - "wget"
  casks:
    - "brave-browser"
    - "signal"
    - "pycharm"
    - "webstorm"
    - "goland"
    - "iterm2"

repositories:
  - name: "fleet"
    origin: "git@github.com:jane/fleet.git"
    path: "~/work/fleet"
    essential: true
  - name: "traefik"
    origin: "git@github.com:jane/traefik.git"
    path: "~/work/traefik"
    essential: true
  - name: "delightd"
    origin: "git@github.com:jane/delightd.git"
    path: "~/work/delightd"
    essential: true
  - name: "paling"
    origin: "git@github.com:jane/paling.git"
    path: "~/work/paling"
    essential: false
  # obs-svc is a non-essential workload (the proof/demo layer): it ships a
  # compose project (obs-svc-agg) that attaches to dev-fleet. it must be in the
  # roster so the lifecycle plan classifies it as a workload and `fleet down`
  # tears it down. bootstrap, which converges only the essential set, leaves it
  # stopped -- that is the intended round-trip.
  - name: "obs-svc"
    origin: "git@github.com:janearc/obs-svc.git"
    path: "~/work/obs-svc"
    essential: false
  - name: "kafka-logging"
    origin: "git@github.com:janearc/kafka-svc.git"
    path: "~/work/kafka-logging"
    essential: true

models:
  - provider: "huggingface"
    id: "bartowski/cognitivecomputations_Dolphin-Mistral-24B-Venice-Edition-GGUF"
    file: "cognitivecomputations_Dolphin-Mistral-24B-Venice-Edition-Q6_K_L.gguf"
  - provider: "ollama"
    id: "llama3.1:latest"
  - provider: "ollama"
    id: "llama3.2:latest"
